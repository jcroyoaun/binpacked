apiVersion: v1
kind: Namespace
metadata:
  name: binpacked
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: binpacked
  namespace: binpacked
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: binpacked-reader
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: binpacked-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: binpacked-reader
subjects:
  - kind: ServiceAccount
    name: binpacked
    namespace: binpacked
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: binpacked
  namespace: binpacked
  labels:
    app: binpacked
spec:
  replicas: 1
  selector:
    matchLabels:
      app: binpacked
  template:
    metadata:
      labels:
        app: binpacked
    spec:
      serviceAccountName: binpacked
      containers:
        - name: binpacked
          image: ghcr.io/jcroyoaun/binpacked:sha-65b3bdcbb3df
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: binpacked
  namespace: binpacked
spec:
  selector:
    app: binpacked
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  type: ClusterIP
