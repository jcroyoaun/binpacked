<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Binpacked - Node Bin Packing Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --k8s-blue: #4a75e8;
      --k8s-blue-light: #9cb8ff;
      --k8s-blue-faint: rgba(74,117,232,0.14);
      --bg: #1d1f22;
      --surface: rgba(39, 40, 44, 0.9);
      --surface-muted: rgba(26, 27, 31, 0.68);
      --card: rgba(48, 49, 52, 0.94);
      --card-hover: rgba(61, 64, 70, 0.96);
      --border: rgba(255,255,255,0.06);
      --border-light: rgba(255,255,255,0.18);
      --text: #f1f3f4;
      --text-secondary: #bdc1c6;
      --text-tertiary: #80868b;
      --cpu-color: #59c35f;
      --cpu-faint: rgba(89,195,95,0.16);
      --mem-color: #6c8fff;
      --mem-faint: rgba(108,143,255,0.16);
      --green: #72d46a;
      --green-faint: rgba(114,212,106,0.14);
      --yellow: #f8c44d;
      --yellow-faint: rgba(248,196,77,0.13);
      --red: #f28b82;
      --red-faint: rgba(242,139,130,0.13);
      --grid-line: rgba(255,255,255,0.1);
      --shadow: 0 12px 32px rgba(0,0,0,0.18);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Roboto', sans-serif;
      background:
        radial-gradient(circle at top, rgba(74,117,232,0.08), transparent 32%),
        linear-gradient(180deg, #1f2024 0%, #1b1c20 100%);
      color: var(--text);
      line-height: 1.45;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    /* ════════ TOP BAR (matches K8s Dashboard) ════════ */
    .top-bar {
      background: rgba(23, 24, 27, 0.96);
      padding: 0 18px;
      height: 50px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .top-bar-logo {
      width: 32px;
      height: 32px;
      flex-shrink: 0;
    }
    .top-bar-title {
      font-size: 17px;
      font-weight: 500;
      color: var(--k8s-blue-light);
      letter-spacing: 0.01em;
    }
    .top-bar-spacer { flex: 1; }

    /* ── Nodegroup dropdown ── */
    .ng-dropdown { position: relative; }
    .ng-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0 12px;
      height: 32px;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .ng-btn:hover {
      border-color: var(--border-light);
      background: rgba(255,255,255,0.05);
    }
    .ng-btn.open { border-color: var(--k8s-blue); }
    .ng-btn svg { flex-shrink: 0; opacity: 0.7; }
    .ng-btn .ng-label { color: var(--text-secondary); }
    .ng-btn .ng-count {
      font-family: 'Roboto Mono', monospace;
      font-size: 11px;
      background: var(--k8s-blue-faint);
      color: var(--k8s-blue-light);
      padding: 1px 6px;
      border-radius: 3px;
    }
    .ng-menu {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      right: 0;
      background: rgba(43, 45, 49, 0.98);
      border: 1px solid var(--border);
      border-radius: 3px;
      min-width: 220px;
      max-height: 320px;
      overflow-y: auto;
      z-index: 60;
      box-shadow: 0 18px 40px rgba(0,0,0,0.35);
      padding: 4px 0;
    }
    .ng-menu.open { display: block; }
    .ng-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.1s;
    }
    .ng-item:hover { background: rgba(255,255,255,0.04); }
    .ng-check {
      width: 16px;
      height: 16px;
      border: 1.5px solid var(--border-light);
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .ng-item.active .ng-check {
      background: var(--k8s-blue);
      border-color: var(--k8s-blue);
    }
    .ng-item.active .ng-check::after {
      content: '';
      width: 8px;
      height: 5px;
      border-left: 2px solid #fff;
      border-bottom: 2px solid #fff;
      transform: rotate(-45deg) translateY(-1px);
    }
    .ng-item-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ng-item-count { font-family: 'Roboto Mono', monospace; font-size: 11px; color: var(--text-tertiary); }
    .ng-divider { height: 1px; background: var(--border); margin: 4px 0; }

    /* ════════ BREADCRUMB BAR ════════ */
    .breadcrumb-bar {
      background: linear-gradient(90deg, #4a75e8 0%, #547ff0 100%);
      padding: 0 18px;
      height: 44px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      box-shadow: inset 0 -1px 0 rgba(255,255,255,0.08);
    }
    .breadcrumb-bar .bc-section { color: rgba(255,255,255,0.82); font-weight: 500; }
    .breadcrumb-bar .bc-sep { color: rgba(255,255,255,0.58); font-size: 15px; }
    .breadcrumb-bar .bc-page { color: #fff; font-weight: 500; }

    /* ════════ MAIN CONTENT ════════ */
    .main-content {
      flex: 1;
      max-width: 1500px;
      width: 100%;
      margin: 0 auto;
      padding: 18px;
    }

    /* ════════ GRAY BOX SECTIONS (K8s cards) ════════ */
    .k8s-card {
      background: linear-gradient(180deg, rgba(52, 53, 57, 0.96) 0%, rgba(44, 45, 49, 0.95) 100%);
      border: 1px solid var(--border);
      border-radius: 4px;
      margin-bottom: 18px;
      overflow: hidden;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }
    .k8s-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 15px 18px 13px;
      font-size: 16px;
      font-weight: 400;
      color: #f5f5f5;
    }
    .k8s-card-body { padding: 0 18px 18px; }

    /* ════════ SUMMARY GRID ════════ */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 14px;
    }
    .stat-box {
      background: linear-gradient(180deg, rgba(255,255,255,0.035), rgba(255,255,255,0.02));
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 14px 15px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.025);
    }
    .stat-box .stat-label {
      font-size: 10px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.11em;
      font-weight: 500;
    }
    .stat-box .stat-value {
      font-family: 'Roboto Mono', monospace;
      font-size: 23px;
      font-weight: 500;
      margin-top: 4px;
      letter-spacing: -0.02em;
    }
    .stat-box .stat-detail {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 3px;
    }

    /* ════════ DISTRIBUTION BAR ════════ */
    .dist-bar {
      display: flex;
      height: 24px;
      border-radius: 3px;
      overflow: hidden;
      gap: 2px;
      background: rgba(0,0,0,0.18);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
    }
    .dist-bar .segment {
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Roboto Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      min-width: 20px;
      transition: flex 0.4s ease;
    }
    .dist-legend {
      display: flex;
      gap: 12px;
      margin-top: 8px;
      font-size: 11px;
      color: var(--text-secondary);
      flex-wrap: wrap;
    }
    .dist-legend span {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .dist-legend .dot {
      width: 8px;
      height: 8px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .dist-legend span.dim { opacity: 0.35; }

    /* ════════ RESOURCE LEGEND (legacy, replaced by .chart-legend) ════════ */
    .resource-legend { display: none; }

    /* ════════ NODEPOOL GROUP ════════ */
    .nodepool-group.hidden { display: none; }
    .nodepool-header {
      display: flex;
      align-items: flex-start;
      padding: 16px 18px 12px;
    }
    .nodepool-title-area { flex: 1; }
    .nodepool-name {
      font-size: 16px;
      font-weight: 400;
      color: var(--text);
      display: block;
      line-height: 1.35;
    }
    .nodepool-subtitle {
      font-family: 'Roboto Mono', monospace;
      font-size: 10px;
      color: var(--text-tertiary);
      margin-top: 6px;
      display: flex;
      align-items: center;
      gap: 10px;
      letter-spacing: 0.02em;
    }
    .nodepool-badge {
      font-family: 'Roboto Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      color: var(--k8s-blue-light);
      background: var(--k8s-blue-faint);
      border: 1px solid rgba(156,184,255,0.14);
      padding: 2px 8px;
      border-radius: 999px;
    }
    .nodepool-collapse {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      cursor: pointer;
      color: var(--text-secondary);
      transition: transform 0.2s, background 0.2s;
      flex-shrink: 0;
      margin-left: 8px;
      border-radius: 3px;
    }
    .nodepool-collapse:hover {
      background: rgba(255,255,255,0.04);
    }
    .nodepool-collapse svg {
      width: 18px;
      height: 18px;
    }
    .nodepool-group.collapsed .nodepool-collapse {
      transform: rotate(180deg);
    }
    .nodepool-group.collapsed .bins-area {
      display: none;
    }

    /* ════════ BIN VISUALIZATION AREA ════════ */
    .bins-area {
      padding: 0 18px 18px;
      position: relative;
    }
    .bins-chart-area {
      position: relative;
      border-radius: 3px;
    }
    /* Y-axis + chart body layout */
    .chart-body {
      display: flex;
      align-items: stretch;
    }
    .y-axis {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 10px 0 14px;
      width: 46px;
      flex-shrink: 0;
      align-items: flex-end;
      padding-right: 8px;
    }
    .y-tick {
      font-family: 'Roboto Mono', monospace;
      font-size: 10px;
      color: var(--text-tertiary);
      line-height: 1;
    }
    .chart-plot {
      flex: 1;
      position: relative;
      padding-top: 2px;
    }
    .plot-grid {
      position: relative;
      min-height: calc(var(--bin-height, 180px) + 18px);
      border-left: 1px solid rgba(255,255,255,0.28);
      border-bottom: 1px solid rgba(255,255,255,0.28);
      background:
        linear-gradient(var(--grid-line) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
      background-size: 34px 34px;
      background-color: rgba(8, 9, 11, 0.14);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03);
      overflow: hidden;
    }
    .bins-row {
      display: flex;
      flex-wrap: wrap;
      gap: var(--bin-gap, 8px);
      align-items: flex-end;
      position: relative;
      z-index: 1;
      padding: 10px 10px 0;
      min-height: calc(var(--bin-height, 180px) + 18px);
    }
    /* X-axis: node names below chart */
    .x-axis {
      display: flex;
      gap: var(--bin-gap, 8px);
      padding: 6px 10px 10px;
      margin-left: 46px;
      border-top: none;
      align-items: stretch;
    }
    .x-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      text-align: center;
      width: var(--bin-width, 80px);
      flex: 0 0 auto;
    }
    .x-label-title {
      font-size: 10px;
      font-weight: 500;
      color: var(--text-secondary);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      line-height: 1.1;
    }
    .x-label-id {
      display: block;
      width: 100%;
      font-family: 'Roboto Mono', monospace;
      font-size: var(--label-font, 10px);
      color: var(--text-tertiary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      letter-spacing: 0.02em;
      line-height: 1.1;
    }
    /* Resource legend inline with chart */
    .chart-legend {
      display: flex;
      gap: 12px;
      padding: 4px 10px 0;
      margin-left: 46px;
      font-size: 11px;
      color: var(--text-secondary);
      flex-wrap: wrap;
    }
    .chart-legend span { display: flex; align-items: center; gap: 4px; }
    .chart-legend .swatch {
      width: 10px;
      height: 10px;
      border-radius: 2px;
    }
    /* ════════ NODE BIN ════════ */
    .node-bin {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      border-radius: 3px;
      padding: var(--bin-padding, 10px 8px 8px);
      transition: background 0.15s, box-shadow 0.15s, transform 0.15s;
      position: relative;
      flex: 0 0 auto;
      width: var(--bin-width, 80px);
    }
    .node-bin:hover {
      background: rgba(255,255,255,0.04);
      transform: translateY(-1px);
    }
    .node-bin.selected {
      background: rgba(74,117,232,0.1);
      box-shadow: inset 0 0 0 1px rgba(156,184,255,0.82);
      border-radius: 3px;
    }

    /* ── Bin Bars ── */
    .bin-bars {
      display: flex;
      gap: var(--bar-gap, 4px);
      align-items: flex-end;
      height: var(--bin-height, 180px);
      width: 100%;
      justify-content: center;
    }
    .bin-bar-track {
      width: var(--bar-width, 20px);
      height: 100%;
      background: rgba(255,255,255,0.05);
      border-radius: var(--bar-radius, 3px);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: flex-end;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
    }
    .bin-bar-fill {
      width: 100%;
      border-radius: var(--bar-radius, 3px);
      min-height: 2px;
      animation: fillUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.18);
    }
    .bin-bar-fill.cpu {
      background: linear-gradient(180deg, rgba(119,224,120,0.96) 0%, rgba(82,190,91,0.92) 52%, rgba(56,145,63,0.86) 100%);
    }
    .bin-bar-fill.mem {
      background: linear-gradient(180deg, rgba(149,172,255,0.96) 0%, rgba(108,143,255,0.9) 58%, rgba(74,117,232,0.82) 100%);
    }

    @keyframes fillUp {
      from { height: 0 !important; }
    }

    /* ── Bin Labels ── */
    .bin-pct {
      font-family: 'Roboto Mono', monospace;
      font-size: var(--pct-font, 12px);
      font-weight: 500;
      margin-top: 7px;
      text-align: center;
      letter-spacing: -0.03em;
    }
    .bin-detail-line {
      font-family: 'Roboto Mono', monospace;
      font-size: var(--detail-font, 10px);
      color: var(--text-tertiary);
      margin-top: 1px;
      text-align: center;
    }
    .bin-label {
      display: none; /* labels now on X-axis */
    }
    .be-indicator {
      font-family: 'Roboto Mono', monospace;
      font-size: 9px;
      font-weight: 500;
      color: var(--yellow);
      background: var(--yellow-faint);
      padding: 0 4px;
      border-radius: 2px;
      margin-top: 3px;
    }

    /* ════════ TOOLTIP ════════ */
    .tooltip {
      display: none;
      position: absolute;
      bottom: calc(100% + 10px);
      left: 50%;
      transform: translateX(-50%);
      background: rgba(60, 64, 67, 0.98);
      border: 1px solid var(--border-light);
      border-radius: 3px;
      padding: 8px 10px;
      font-size: 12px;
      white-space: nowrap;
      z-index: 20;
      pointer-events: none;
      box-shadow: 0 12px 24px rgba(0,0,0,0.3);
    }
    .tooltip::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: #3c4043;
    }
    .node-bin:hover .tooltip { display: block; }
    .tt-title {
      font-weight: 500;
      font-size: 12px;
      margin-bottom: 4px;
      padding-bottom: 4px;
      border-bottom: 1px solid var(--border-light);
    }
    .tt-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      line-height: 1.6;
    }
    .tt-lbl { color: var(--text-secondary); }
    .tt-val { font-family: 'Roboto Mono', monospace; font-weight: 500; }

    /* ════════ DETAIL PANEL ════════ */
    .detail-panel {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .detail-panel.open {
      max-height: 560px;
      overflow: visible;
    }
    .detail-header {
      padding: 12px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border);
      border-top: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
    }
    .detail-header .node-title {
      font-weight: 500;
      font-size: 14px;
    }
    .detail-header .node-title::before {
      content: 'Node';
      display: block;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 2px;
    }
    .detail-header .node-meta { font-size: 12px; color: var(--text-secondary); }
    .detail-header .close-btn {
      margin-left: auto;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 13px;
      padding: 4px 8px;
      border-radius: 3px;
    }
    .detail-header .close-btn:hover {
      color: var(--text);
      background: var(--card-hover);
    }
    .detail-stats {
      display: flex;
      gap: 24px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .d-stat .d-stat-label {
      font-size: 10px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      font-weight: 500;
    }
    .d-stat .d-stat-value {
      font-family: 'Roboto Mono', monospace;
      font-weight: 500;
      font-size: 16px;
      margin-top: 1px;
    }
    .d-stat .d-stat-sub {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 1px;
    }
    .d-stat-bar {
      width: 100px;
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 4px;
    }
    .d-stat-bar-fill { height: 100%; border-radius: 2px; }

    /* ════════ TABLE ════════ */
    .pod-table-wrap {
      max-height: 280px;
      overflow-y: auto;
    }
    .pod-table-wrap::-webkit-scrollbar { width: 5px; }
    .pod-table-wrap::-webkit-scrollbar-track { background: transparent; }
    .pod-table-wrap::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.16); border-radius: 3px; }

    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 10px 18px; border-bottom: 1px solid var(--border); }
    th {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-secondary);
      position: sticky;
      top: 0;
      background: rgba(52, 53, 57, 0.98);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    td { font-size: 12.5px; }
    tr:hover td { background: rgba(255,255,255,0.025); }

    .qos {
      font-family: 'Roboto Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      padding: 2px 6px;
      border-radius: 999px;
    }
    .qos-guaranteed { background: var(--green-faint); color: var(--green); }
    .qos-burstable { background: var(--mem-faint); color: var(--mem-color); }
    .qos-besteffort { background: var(--yellow-faint); color: var(--yellow); }
    .ds-badge {
      font-family: 'Roboto Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      background: rgba(138,180,248,0.12);
      color: var(--k8s-blue-light);
      padding: 1px 5px;
      border-radius: 3px;
      margin-left: 4px;
    }

    /* ════════ FOOTER ════════ */
    footer {
      flex-shrink: 0;
      border-top: 1px solid var(--border);
      padding: 12px 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      font-size: 11px;
      color: var(--text-tertiary);
      background: rgba(18, 19, 22, 0.74);
    }
    footer a {
      color: var(--k8s-blue-light);
      text-decoration: none;
    }
    footer a:hover { text-decoration: underline; }

    .loading { text-align: center; padding: 60px; color: var(--text-secondary); font-size: 14px; }
    .error { text-align: center; padding: 24px; color: var(--red); font-size: 14px; }

    @media (max-width: 900px) {
      .main-content { padding: 14px; }
      .summary-grid { grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); }
      .dist-legend { gap: 10px; }
      .detail-stats { gap: 18px; }
    }

    @media (max-width: 640px) {
      .top-bar {
        height: auto;
        min-height: 50px;
        padding: 10px 14px;
        flex-wrap: wrap;
      }
      .breadcrumb-bar {
        padding: 0 14px;
        height: 40px;
      }
      .main-content { padding: 12px; }
      .k8s-card-header,
      .nodepool-header,
      .bins-area,
      .detail-header,
      .detail-stats {
        padding-left: 14px;
        padding-right: 14px;
      }
      .k8s-card-body { padding: 0 14px 14px; }
      th, td { padding-left: 14px; padding-right: 14px; }
      .chart-legend,
      .x-axis {
        margin-left: 36px;
      }
      .y-axis {
        width: 36px;
        padding-right: 6px;
      }
      .plot-grid,
      .bins-row {
        min-height: calc(var(--bin-height, 180px) + 14px);
      }
    }
  </style>
</head>
<body>

  <!-- ════════ TOP BAR ════════ -->
  <div class="top-bar">
    <img src="k8s-logo.svg" alt="Kubernetes" class="top-bar-logo" />
    <span class="top-bar-title">Binpacked</span>
    <div class="top-bar-spacer"></div>
    <div class="ng-dropdown" id="ng-dropdown">
      <button class="ng-btn" id="ng-btn">
        <span class="ng-label">Nodegroups</span>
        <span class="ng-count" id="ng-count">0</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="ng-menu" id="ng-menu"></div>
    </div>
  </div>

  <!-- ════════ BREADCRUMB BAR ════════ -->
  <div class="breadcrumb-bar">
    <span class="bc-section">Cluster</span>
    <span class="bc-sep">></span>
    <span class="bc-page">Bin Packing</span>
  </div>

  <!-- ════════ MAIN CONTENT ════════ -->
  <div class="main-content">
    <div id="app"><div class="loading">Loading cluster data...</div></div>
  </div>

  <!-- ════════ FOOTER ════════ -->
  <footer>
    <span>binpacked v1.0</span>
    <a href="https://github.com/kubernetes/dashboard" target="_blank">Documentation</a>
    <a href="https://kubernetes.io/docs/tasks/access-application-cluster/web-ui-dashboard/" target="_blank">Community</a>
  </footer>

  <script>
    const $ = (sel, ctx = document) => ctx.querySelector(sel);
    const $$ = (sel, ctx = document) => [...ctx.querySelectorAll(sel)];

    let nodesData = [];
    let selectedNode = null;
    let selectedGroupId = null;

    const NODEPOOL_LABELS = [
      'eks.amazonaws.com/nodegroup',
      'cloud.google.com/gke-nodepool',
      'kops.k8s.io/instancegroup',
      'node.kubernetes.io/nodepool',
      'agentpool',
      'nodepool',
    ];

    function getNodepool(labels) {
      if (!labels) return null;
      for (const key of NODEPOOL_LABELS) {
        if (labels[key]) return labels[key];
      }
      return null;
    }

    function groupByNodepool(nodes) {
      const groups = new Map();
      for (const node of nodes) {
        const pool = getNodepool(node.labels) || '(ungrouped)';
        if (!groups.has(pool)) groups.set(pool, []);
        groups.get(pool).push(node);
      }
      for (const [, list] of groups) {
        list.sort((a, b) => maxRatio(b) - maxRatio(a));
      }
      return [...groups.entries()].sort((a, b) => {
        if (a[0] === '(ungrouped)') return 1;
        if (b[0] === '(ungrouped)') return -1;
        return a[0].localeCompare(b[0]);
      });
    }

    function maxRatio(n) {
      return Math.max(n.cpu.requestRatio, n.memory.requestRatio);
    }
    function ratioColor(r) {
      if (r >= 0.75) return 'var(--green)';
      if (r >= 0.50) return 'var(--yellow)';
      return 'var(--red)';
    }
    function fmtPct(r) { return (r * 100).toFixed(1) + '%'; }
    function fmtCPU(m) { return m >= 1000 ? (m / 1000).toFixed(1) + ' cores' : m + 'm'; }
    function fmtMem(b) {
      const gib = b / (1024 * 1024 * 1024);
      return gib >= 1 ? gib.toFixed(1) + ' GiB' : (b / (1024 * 1024)).toFixed(0) + ' MiB';
    }
    function shortName(name) {
      const first = name.split('.')[0];
      if (first.length > 24) {
        const p = first.split('-');
        return p.length > 2 ? p.slice(-2).join('-') : first;
      }
      return first;
    }

    function nodeDisplayId(name) {
      const first = name.split('.')[0];
      const ipMatch = first.match(/^ip-(\d+)-(\d+)-(\d+)-(\d+)$/);
      if (ipMatch) return `${ipMatch[1]}.${ipMatch[2]}.${ipMatch[3]}.${ipMatch[4]}`;

      const parts = first.split('-').filter(Boolean);
      if (parts.length >= 2) {
        const tail = parts[parts.length - 1];
        if (/^[a-f0-9]+$/i.test(tail) && tail.length >= 6) return tail.slice(0, 8);
        return parts.slice(-2).join('-').slice(0, 12);
      }

      return first.length > 12 ? `${first.slice(0, 6)}...${first.slice(-4)}` : first;
    }

    function renderXAxisLabel(name, index) {
      const label = String(index + 1).padStart(2, '0');
      return `
        <span class="x-label" title="${name}">
          <span class="x-label-title">Node ${label}</span>
          <span class="x-label-id">${nodeDisplayId(name)}</span>
        </span>`;
    }

    // ── Reactive bin sizing ──
    function binSizeVars(count) {
      if (count <= 2) return { '--bin-width':'200px','--bin-height':'260px','--bar-width':'36px','--bar-gap':'6px','--bar-radius':'4px','--bin-padding':'12px 10px 8px','--pct-font':'14px','--detail-font':'11px','--label-font':'12px','--bin-gap':'12px' };
      if (count <= 5) return { '--bin-width':'150px','--bin-height':'230px','--bar-width':'28px','--bar-gap':'5px','--bar-radius':'4px','--bin-padding':'10px 8px 8px','--pct-font':'13px','--detail-font':'10px','--label-font':'11px','--bin-gap':'10px' };
      if (count <= 12) return { '--bin-width':'100px','--bin-height':'190px','--bar-width':'22px','--bar-gap':'4px','--bar-radius':'3px','--bin-padding':'8px 6px 6px','--pct-font':'12px','--detail-font':'10px','--label-font':'11px','--bin-gap':'8px' };
      if (count <= 30) return { '--bin-width':'68px','--bin-height':'160px','--bar-width':'16px','--bar-gap':'3px','--bar-radius':'3px','--bin-padding':'6px 4px 5px','--pct-font':'11px','--detail-font':'9px','--label-font':'10px','--bin-gap':'6px' };
      if (count <= 60) return { '--bin-width':'52px','--bin-height':'130px','--bar-width':'12px','--bar-gap':'2px','--bar-radius':'2px','--bin-padding':'5px 3px 4px','--pct-font':'10px','--detail-font':'8px','--label-font':'9px','--bin-gap':'4px' };
      return { '--bin-width':'40px','--bin-height':'100px','--bar-width':'9px','--bar-gap':'2px','--bar-radius':'2px','--bin-padding':'4px 2px 3px','--pct-font':'9px','--detail-font':'8px','--label-font':'8px','--bin-gap':'3px' };
    }
    function styleStr(vars) { return Object.entries(vars).map(([k,v]) => `${k}:${v}`).join(';'); }

    const DIST_COLORS = ['#5c3333', '#7a5a2e', '#4a5a3a', '#326CE5', '#2a7a4a'];
    const DIST_TEXT   = ['#ea9a9a', '#eaca8a', '#b8d888', '#fff',    '#8ae8aa'];
    const DIST_KEYS = ['0-25', '25-50', '50-75', '75-90', '90-100'];
    const DIST_LABELS = ['0-25%', '25-50%', '50-75%', '75-90%', '90-100%'];

    function renderSummary(s) {
      const total = s.totalNodes || 1;
      return `
        <!-- ── Cluster Overview ── -->
        <div class="k8s-card">
          <div class="k8s-card-header">Cluster Overview</div>
          <div class="k8s-card-body">
            <div class="summary-grid">
              <div class="stat-box">
                <div class="stat-label">Nodes</div>
                <div class="stat-value">${s.totalNodes}</div>
                <div class="stat-detail">${s.totalPods} pods running</div>
              </div>
              <div class="stat-box">
                <div class="stat-label">CPU Packing</div>
                <div class="stat-value" style="color:${ratioColor(s.cpu.requestRatio)}">${fmtPct(s.cpu.requestRatio)}</div>
                <div class="stat-detail">${fmtCPU(s.cpu.requested)} / ${fmtCPU(s.cpu.allocatable)}</div>
              </div>
              <div class="stat-box">
                <div class="stat-label">Memory Packing</div>
                <div class="stat-value" style="color:${ratioColor(s.memory.requestRatio)}">${fmtPct(s.memory.requestRatio)}</div>
                <div class="stat-detail">${fmtMem(s.memory.requested)} / ${fmtMem(s.memory.allocatable)}</div>
              </div>
              <div class="stat-box">
                <div class="stat-label">Stranded CPU</div>
                <div class="stat-value" style="color:var(--yellow)">${fmtCPU(s.strandedResources.cpuMillicores)}</div>
                <div class="stat-detail">Unrequested capacity</div>
              </div>
              <div class="stat-box">
                <div class="stat-label">Stranded Memory</div>
                <div class="stat-value" style="color:var(--yellow)">${fmtMem(s.strandedResources.memoryBytes)}</div>
                <div class="stat-detail">Unrequested capacity</div>
              </div>
            </div>
          </div>
        </div>
        ${total >= 8 ? `
        <!-- ── Packing Distribution ── -->
        <div class="k8s-card">
          <div class="k8s-card-header">Packing Distribution</div>
          <div class="k8s-card-body">
            <div class="dist-bar">
              ${DIST_KEYS.map((k, i) => {
                const count = s.distribution[k] || 0;
                if (count === 0) return '';
                const pct = (count / total) * 100;
                return '<div class="segment" style="flex:'+pct+';background:'+DIST_COLORS[i]+';color:'+DIST_TEXT[i]+'">'+count+'</div>';
              }).join('')}
            </div>
            <div class="dist-legend">
              ${DIST_KEYS.map((k, i) => {
                const count = s.distribution[k] || 0;
                return '<span class="'+(count === 0 ? 'dim' : '')+'"><span class="dot" style="background:'+DIST_COLORS[i]+'"></span>'+DIST_LABELS[i]+'</span>';
              }).join('')}
            </div>
          </div>
        </div>` : ''}`;
    }

    function poolAgg(nodes) {
      let cr=0,ca=0,mr=0,ma=0,p=0;
      for (const n of nodes) { cr+=n.cpu.requested; ca+=n.cpu.allocatable; mr+=n.memory.requested; ma+=n.memory.allocatable; p+=n.pods.count; }
      return 'cpu '+fmtPct(ca?cr/ca:0)+'  mem '+fmtPct(ma?mr/ma:0)+'  '+p+' pods';
    }

    function renderBins(nodes) {
      const groups = groupByNodepool(nodes);
      nodesData = nodes;
      let binIdx = 0;
      let html = '';

      for (const [poolName, poolNodes] of groups) {
        const gid = poolName.replace(/[^a-zA-Z0-9]/g, '_');
        const vars = binSizeVars(poolNodes.length);
        const showDetail = poolNodes.length <= 12;

        const binHeight = parseInt(vars['--bin-height']) || 180;

        html += `
        <div class="k8s-card nodepool-group" data-pool="${poolName.toLowerCase()}">
          <div class="nodepool-header">
            <div class="nodepool-title-area">
              <span class="nodepool-name">${poolName}</span>
              <div class="nodepool-subtitle">
                <span class="nodepool-badge">${poolNodes.length} node${poolNodes.length !== 1 ? 's' : ''}</span>
                <span>${poolAgg(poolNodes)}</span>
              </div>
            </div>
            <span class="nodepool-collapse" title="Toggle chart"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></span>
          </div>
          <div class="bins-area">
            <div class="bins-chart-area">
              <div class="chart-body">
                <div class="y-axis" style="height:${binHeight + 18}px">
                  <span class="y-tick">100%</span>
                  <span class="y-tick">75%</span>
                  <span class="y-tick">50%</span>
                  <span class="y-tick">25%</span>
                  <span class="y-tick">0</span>
                </div>
                <div class="chart-plot" style="${styleStr(vars)}">
                  <div class="plot-grid">
                    <div class="bins-row">
                      ${poolNodes.map(n => {
                        const out = renderNodeBin(n, gid, binIdx, showDetail);
                        binIdx++;
                        return out;
                      }).join('')}
                    </div>
                  </div>
                </div>
              </div>
              <div class="x-axis" style="${styleStr(vars)}">
                ${poolNodes.map((n, i) => renderXAxisLabel(n.name, i)).join('')}
              </div>
              <div class="chart-legend">
                <span><span class="swatch" style="background:var(--cpu-color)"></span> CPU</span>
                <span><span class="swatch" style="background:var(--mem-color)"></span> Memory</span>
              </div>
            </div>
          </div>
          <div class="detail-panel" id="detail-${gid}"></div>
        </div>`;
      }
      return html;
    }

    function renderNodeBin(n, groupId, idx, showDetail) {
      const cpuPct = Math.min(n.cpu.requestRatio * 100, 100);
      const memPct = Math.min(n.memory.requestRatio * 100, 100);
      const dominant = maxRatio(n);
      const color = ratioColor(dominant);
      const delay = idx * 35;

      return `
        <div class="node-bin" data-node="${n.name}" data-group="${groupId}">
          <div class="tooltip">
            <div class="tt-title">${n.name}</div>
            <div class="tt-row"><span class="tt-lbl">CPU</span><span class="tt-val" style="color:${ratioColor(n.cpu.requestRatio)}">${fmtPct(n.cpu.requestRatio)}</span></div>
            <div class="tt-row"><span class="tt-lbl"></span><span class="tt-val" style="font-weight:400;color:var(--text-secondary)">${fmtCPU(n.cpu.requested)} / ${fmtCPU(n.cpu.allocatable)}</span></div>
            <div class="tt-row"><span class="tt-lbl">Memory</span><span class="tt-val" style="color:${ratioColor(n.memory.requestRatio)}">${fmtPct(n.memory.requestRatio)}</span></div>
            <div class="tt-row"><span class="tt-lbl"></span><span class="tt-val" style="font-weight:400;color:var(--text-secondary)">${fmtMem(n.memory.requested)} / ${fmtMem(n.memory.allocatable)}</span></div>
            <div class="tt-row"><span class="tt-lbl">Pods</span><span class="tt-val">${n.pods.count} / ${n.pods.allocatable}</span></div>
            <div class="tt-row"><span class="tt-lbl">Bottleneck</span><span class="tt-val">${n.bottleneck}</span></div>
            ${n.bestEffortPodCount > 0 ? '<div class="tt-row"><span class="tt-lbl">BestEffort</span><span class="tt-val" style="color:var(--yellow)">'+n.bestEffortPodCount+'</span></div>' : ''}
            ${n.daemonSetPodCount > 0 ? '<div class="tt-row"><span class="tt-lbl">DaemonSet</span><span class="tt-val" style="color:var(--k8s-blue-light)">'+n.daemonSetPodCount+'</span></div>' : ''}
          </div>
          <div class="bin-bars">
            <div class="bin-bar-track"><div class="bin-bar-fill cpu" style="height:${cpuPct}%;animation-delay:${delay}ms"></div></div>
            <div class="bin-bar-track"><div class="bin-bar-fill mem" style="height:${memPct}%;animation-delay:${delay+50}ms"></div></div>
          </div>
          <div class="bin-pct" style="color:${color}">${fmtPct(dominant)}</div>
          ${showDetail ? '<div class="bin-detail-line">'+fmtPct(n.cpu.requestRatio)+' / '+fmtPct(n.memory.requestRatio)+'</div>' : ''}
          ${n.bestEffortPodCount > 0 ? '<span class="be-indicator">'+n.bestEffortPodCount+' BE</span>' : ''}
        </div>`;
    }

    function renderDetailPanel(node, pods) {
      const cpuPct = Math.min(node.cpu.requestRatio * 100, 100);
      const memPct = Math.min(node.memory.requestRatio * 100, 100);
      let podRows = '';
      if (!pods || pods.length === 0) {
        podRows = '<tr><td colspan="5" style="text-align:center;color:var(--text-secondary);padding:16px">No pods</td></tr>';
      } else {
        podRows = pods.map(p => '<tr>'+
          '<td style="font-family:Roboto Mono,monospace;font-size:12px">'+p.name+(p.isDaemonSet?'<span class="ds-badge">DS</span>':'')+'</td>'+
          '<td>'+p.namespace+'</td>'+
          '<td style="font-family:Roboto Mono,monospace">'+fmtCPU(p.cpu.requested)+'</td>'+
          '<td style="font-family:Roboto Mono,monospace">'+fmtMem(p.memory.requested)+'</td>'+
          '<td><span class="qos qos-'+p.qosClass.toLowerCase()+'">'+p.qosClass+'</span></td>'+
          '</tr>').join('');
      }
      return `
        <div class="detail-header">
          <span class="node-title">${node.name}</span>
          <span class="node-meta">${node.pods.count} pods &middot; bottleneck: ${node.bottleneck}</span>
          <button class="close-btn" onclick="closeDetail()">&#x2715;</button>
        </div>
        <div class="detail-stats">
          <div class="d-stat">
            <div class="d-stat-label">CPU</div>
            <div class="d-stat-value" style="color:${ratioColor(node.cpu.requestRatio)}">${fmtPct(node.cpu.requestRatio)}</div>
            <div class="d-stat-sub">${fmtCPU(node.cpu.requested)} / ${fmtCPU(node.cpu.allocatable)}</div>
            <div class="d-stat-bar"><div class="d-stat-bar-fill" style="width:${cpuPct}%;background:var(--cpu-color)"></div></div>
          </div>
          <div class="d-stat">
            <div class="d-stat-label">Memory</div>
            <div class="d-stat-value" style="color:${ratioColor(node.memory.requestRatio)}">${fmtPct(node.memory.requestRatio)}</div>
            <div class="d-stat-sub">${fmtMem(node.memory.requested)} / ${fmtMem(node.memory.allocatable)}</div>
            <div class="d-stat-bar"><div class="d-stat-bar-fill" style="width:${memPct}%;background:var(--mem-color)"></div></div>
          </div>
          <div class="d-stat">
            <div class="d-stat-label">Pods</div>
            <div class="d-stat-value">${node.pods.count} / ${node.pods.allocatable}</div>
            <div class="d-stat-sub">${fmtPct(node.pods.ratio)} utilized</div>
          </div>
          ${node.bestEffortPodCount > 0 ? '<div class="d-stat"><div class="d-stat-label">BestEffort</div><div class="d-stat-value" style="color:var(--yellow)">'+node.bestEffortPodCount+'</div><div class="d-stat-sub">No requests</div></div>' : ''}
          ${node.daemonSetPodCount > 0 ? '<div class="d-stat"><div class="d-stat-label">DaemonSet</div><div class="d-stat-value" style="color:var(--k8s-blue-light)">'+node.daemonSetPodCount+'</div><div class="d-stat-sub">System pods</div></div>' : ''}
        </div>
        <div class="pod-table-wrap">
          <table><thead><tr><th>Pod</th><th>Namespace</th><th>CPU Req</th><th>Mem Req</th><th>QoS</th></tr></thead>
          <tbody>${podRows}</tbody></table>
        </div>`;
    }

    function closeDetail() {
      $$('.detail-panel.open').forEach(el => { el.classList.remove('open'); el.innerHTML = ''; });
      $$('.node-bin.selected').forEach(el => el.classList.remove('selected'));
      selectedNode = null;
      selectedGroupId = null;
    }

    // ── Nodegroup dropdown ──
    let ngVisible = new Set();
    function buildDropdown(groups) {
      const menu = $('#ng-menu');
      if (!menu) return;
      ngVisible = new Set(groups.map(([name]) => name));
      let html = '<div class="ng-item active" data-ng="__all"><div class="ng-check"></div><span class="ng-item-label" style="font-weight:500">All nodegroups</span></div><div class="ng-divider"></div>';
      for (const [name, nodes] of groups) {
        html += '<div class="ng-item active" data-ng="'+name+'"><div class="ng-check"></div><span class="ng-item-label">'+name+'</span><span class="ng-item-count">'+nodes.length+'</span></div>';
      }
      menu.innerHTML = html;
      updateNgCount();
    }
    function updateNgCount() {
      const countEl = $('#ng-count');
      const total = $$('.ng-item[data-ng]:not([data-ng="__all"])').length;
      if (countEl) countEl.textContent = ngVisible.size+'/'+total;
    }
    function applyFilter() {
      $$('.nodepool-group').forEach(g => {
        const pool = g.dataset.pool || '';
        const match = [...ngVisible].some(v => v.toLowerCase() === pool);
        g.classList.toggle('hidden', !match);
      });
    }

    async function fetchJSON(url) {
      const resp = await fetch(url);
      if (!resp.ok) throw new Error('HTTP '+resp.status);
      return resp.json();
    }

    async function load() {
      const app = $('#app');
      try {
        const [summary, nodesResp] = await Promise.all([
          fetchJSON('/api/v1/cluster-summary'),
          fetchJSON('/api/v1/nodes'),
        ]);
        const nodes = nodesResp.nodes || [];
        const groups = groupByNodepool(nodes);
        app.innerHTML = renderSummary(summary) + renderBins(nodes);
        buildDropdown(groups);
        attachListeners();
        applyFilter();
      } catch (err) {
        app.innerHTML = '<div class="error">Failed to load cluster data: '+err.message+'</div>';
      }
    }

    function attachListeners() {
      $$('.node-bin').forEach(bin => {
        bin.addEventListener('click', async (e) => {
          e.stopPropagation();
          const nodeName = bin.dataset.node;
          const groupId = bin.dataset.group;
          if (selectedNode === nodeName && selectedGroupId === groupId) { closeDetail(); return; }
          closeDetail();
          selectedNode = nodeName;
          selectedGroupId = groupId;
          bin.classList.add('selected');
          const panel = $('#detail-'+groupId);
          if (!panel) return;
          panel.innerHTML = '<div style="padding:16px;color:var(--text-secondary);font-size:13px">Loading pods...</div>';
          panel.classList.add('open');
          const node = nodesData.find(n => n.name === nodeName);
          if (!node) return;
          try {
            const data = await fetchJSON('/api/v1/nodes/'+encodeURIComponent(nodeName)+'/pods');
            panel.innerHTML = renderDetailPanel(node, data.pods || []);
          } catch (err) {
            panel.innerHTML = '<div class="error" style="padding:16px">Failed: '+err.message+'</div>';
          }
        });
      });
    }

    // ── Dropdown handlers ──
    document.addEventListener('click', (e) => {
      const btn = $('#ng-btn');
      const menu = $('#ng-menu');
      if (!btn || !menu) return;
      if (btn.contains(e.target)) { btn.classList.toggle('open'); menu.classList.toggle('open'); return; }
      const item = e.target.closest('.ng-item');
      if (item && menu.contains(item)) {
        const ng = item.dataset.ng;
        if (ng === '__all') {
          const allItems = $$('.ng-item[data-ng]:not([data-ng="__all"])');
          const allActive = allItems.every(el => el.classList.contains('active'));
          if (allActive) { ngVisible.clear(); allItems.forEach(el => el.classList.remove('active')); item.classList.remove('active'); }
          else { allItems.forEach(el => { el.classList.add('active'); ngVisible.add(el.dataset.ng); }); item.classList.add('active'); }
        } else {
          if (ngVisible.has(ng)) { ngVisible.delete(ng); item.classList.remove('active'); }
          else { ngVisible.add(ng); item.classList.add('active'); }
          const allItems = $$('.ng-item[data-ng]:not([data-ng="__all"])');
          const allEl = $('.ng-item[data-ng="__all"]');
          if (allEl) allEl.classList.toggle('active', allItems.every(el => el.classList.contains('active')));
        }
        updateNgCount();
        applyFilter();
        return;
      }
      if (!menu.contains(e.target)) { btn.classList.remove('open'); menu.classList.remove('open'); }
    });

    // ── Collapse toggle for nodepool chart areas ──
    document.addEventListener('click', (e) => {
      const toggle = e.target.closest('.nodepool-collapse');
      if (toggle) {
        toggle.closest('.nodepool-group').classList.toggle('collapsed');
      }
    });

    load();
    setInterval(load, 30000);
  </script>
</body>
</html>
