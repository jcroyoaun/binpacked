<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Binpacked - Node Bin Packing Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="top-bar">
    <img src="k8s-logo.svg" alt="Kubernetes" class="top-bar-logo" />
    <span class="top-bar-title">Binpacked</span>
    <div class="top-bar-spacer"></div>
    <div class="ng-dropdown" id="ng-dropdown">
      <button class="ng-btn" id="ng-btn" type="button">
        <span class="ng-label">Nodegroups</span>
        <span class="ng-count" id="ng-count">0</span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="ng-menu" id="ng-menu"></div>
    </div>
  </div>

  <div class="breadcrumb-bar">
    <span class="bc-section">Cluster</span>
    <span class="bc-sep">></span>
    <span class="bc-page">Bin Packing</span>
  </div>

  <div class="main-content">
    <div id="app"><div class="loading">Loading cluster data...</div></div>
  </div>

  <footer>
    <span>binpacked v1.0</span>
    <a href="https://github.com/kubernetes/dashboard" target="_blank">Documentation</a>
    <a href="https://kubernetes.io/docs/tasks/access-application-cluster/web-ui-dashboard/" target="_blank">Community</a>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
