<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Binpacked | Kubernetes Bin Packing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script>
    (function () {
      var theme = 'light';
      try { theme = localStorage.getItem('binpacked-theme') === 'dark' ? 'dark' : 'light'; } catch (e) { /* storage unavailable */ }
      document.documentElement.dataset.theme = theme;
    })();
  </script>
</head>
<body>
  <header class="app-bar">
    <a class="app-brand" href="/">
      <img src="k8s-logo.svg" alt="Kubernetes" class="app-brand-logo" />
      <span class="app-brand-name">Binpacked</span>
    </a>
    <div class="global-search">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <input id="node-search" type="search" placeholder="Search nodes" autocomplete="off" spellcheck="false" aria-label="Search nodes" />
    </div>
    <div class="app-bar-actions">
      <div class="ng-dropdown" id="ng-dropdown">
        <button class="ng-btn" id="ng-btn" type="button">
          <span class="ng-label">Node groups</span>
          <span class="ng-count" id="ng-count">0</span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="ng-menu" id="ng-menu"></div>
      </div>
      <button class="icon-btn" id="theme-toggle" type="button" title="Toggle theme" aria-label="Toggle theme">
        <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/></svg>
        <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36c.39-.39.39-1.03 0-1.41-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/></svg>
      </button>
    </div>
  </header>

  <div class="second-toolbar">
    <button class="icon-btn toolbar-btn" id="nav-toggle" type="button" title="Toggle navigation" aria-label="Toggle navigation">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
    </button>
    <nav class="breadcrumbs" aria-label="Breadcrumb">
      <span class="bc-crumb">Cluster</span>
      <span class="bc-sep">/</span>
      <span class="bc-crumb bc-active">Bin Packing</span>
    </nav>
    <div class="toolbar-spacer"></div>
    <button class="icon-btn toolbar-btn" id="refresh-btn" type="button" title="Refresh" aria-label="Refresh">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-8 8s3.57 8 8 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
    </button>
  </div>

  <div class="app-body">
    <aside class="nav-drawer" id="nav-drawer">
      <div class="nav-group-header">Cluster</div>
      <a class="nav-item active" href="/">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
        <span>Bin Packing</span>
      </a>
      <div class="nav-group-header">Node Pools</div>
      <div id="nav-pools"></div>
    </aside>

    <main class="main-content">
      <div id="app"><div class="loading">Loading cluster data&hellip;</div></div>
      <footer>
        <span>binpacked v1.0</span>
        <a href="https://github.com/jcroyoaun/binpacked" target="_blank" rel="noopener">GitHub</a>
        <a href="https://kubernetes.io/docs/concepts/scheduling-eviction/" target="_blank" rel="noopener">Scheduling docs</a>
      </footer>
    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
